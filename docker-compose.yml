services:
    postgres:
        image: postgres:16
        container_name: delivery_dispatch_postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: delivery_dispatch
        volumes:
            - delivery_dispatch_data:/var/lib/postgresql/data

volumes:
    delivery_dispatch_data: