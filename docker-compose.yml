services:
    postgres:
        image: postgres:16
        container_name: delivery_dispatch_postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: delivery_dispatch
        volumes:
            - delivery_dispatch_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        container_name: delivery_dispatch_redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - delivery_dispatch_redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 10

    kafka:
        image: apache/kafka:3.9.1
        container_name: delivery_dispatch_kafka
        restart: unless-stopped
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
            KAFKA_LOG_DIRS: /var/lib/kafka/data
        volumes:
            - delivery_dispatch_kafka_data:/var/lib/kafka/data
        healthcheck:
            test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
            interval: 10s
            timeout: 5s
            retries: 10

    opensearch:
        image: opensearchproject/opensearch:2.17.1
        container_name: delivery_dispatch_opensearch
        restart: unless-stopped
        environment:
            discovery.type: single-node
            bootstrap.memory_lock: "true"
            OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
            DISABLE_INSTALL_DEMO_CONFIG: "true"
            DISABLE_SECURITY_PLUGIN: "true"
        ports:
            - "9200:9200"
            - "9600:9600"
        ulimits:
            memlock:
                soft: -1
                hard: -1
        volumes:
            - delivery_dispatch_opensearch_data:/usr/share/opensearch/data
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health > /dev/null"]
            interval: 10s
            timeout: 5s
            retries: 20

    opensearch-dashboards:
        image: opensearchproject/opensearch-dashboards:2.17.1
        container_name: delivery_dispatch_opensearch_dashboards
        restart: unless-stopped
        depends_on:
            opensearch:
                condition: service_healthy
        environment:
            OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
            DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
        ports:
            - "5601:5601"

volumes:
    delivery_dispatch_data:
    delivery_dispatch_redis_data:
    delivery_dispatch_kafka_data:
    delivery_dispatch_opensearch_data:
