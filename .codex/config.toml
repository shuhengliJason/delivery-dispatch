# Project-scoped Codex settings for delivery-dispatch.
# Keep this file lean. User-level settings remain in ~/.codex/config.toml.

[features]
multi_agent = true

[agents]
max_threads = 3
max_depth = 1

[agents.reviewer]
description = "Read-only reviewer focused on correctness, authorization, security, and missing tests."
config_file = "./agents/reviewer.toml"

[agents.docs_researcher]
description = "Read-only documentation researcher for Next.js, Prisma, Better Auth, and other primary docs."
config_file = "./agents/docs-researcher.toml"

[[skills.config]]
path = "./skills/ecc-nextjs-turbopack/SKILL.md"
enabled = true

[[skills.config]]
path = "./skills/ecc-security-review/SKILL.md"
enabled = true

[[skills.config]]
path = "./skills/ecc-verification-loop/SKILL.md"
enabled = true

[[skills.config]]
path = "./skills/ecc-tdd-workflow/SKILL.md"
enabled = true

[[skills.config]]
path = "./skills/ecc-frontend-patterns/SKILL.md"
enabled = true

[[skills.config]]
path = "./skills/ecc-backend-patterns/SKILL.md"
enabled = true
